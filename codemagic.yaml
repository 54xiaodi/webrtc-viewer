workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Package IPA for AltStore
        script: |
          APP_PATH=$(find build -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebRTCViewer.ipa Payload
          echo "IPA created: $(ls -la WebRTCViewer.ipa)"
    artifacts:
      - ./*.ipa
